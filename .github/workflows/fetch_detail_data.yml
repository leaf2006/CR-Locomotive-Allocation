name: fetch_detail_data

on:
  workflow_call:
    inputs:
      retry:
        description: "当前重试次数"
        required: true
        type: string
      artifact_name:
        description: "要下载的 artifact 名称"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      retry:
        description: "当前重试次数"
        required: true
        type: string

jobs:
  detail:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 解析输入参数 ──
      - name: Resolve inputs
        id: inputs
        run: |
          RETRY="${{ inputs.retry }}"
          NEXT_RETRY=$((RETRY + 1))
          echo "retry=$RETRY" >> "$GITHUB_OUTPUT"
          echo "next_retry=$NEXT_RETRY" >> "$GITHUB_OUTPUT"

      # ── 2. 拉取最新代码（必须先于 data 恢复，否则 checkout 会覆盖 data） ──
      - uses: actions/checkout@v4

      # ── 3. 恢复 data/ 目录（cache 优先，用于重试；artifact 兜底，用于首次） ──
      #    restore 使用前缀匹配，自动获取最新的缓存条目
      - name: Restore data from cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/data
          key: detail-state-r${{ steps.inputs.outputs.retry }}-${{ github.run_id }}
          restore-keys: |
            detail-state-r${{ steps.inputs.outputs.retry }}-
            detail-state-

      #    cache 无 TTL 配置，手动检查：若 backup.json 超过 1 小时则视为过期
      - name: Check cache freshness
        id: freshness
        if: ${{ steps.cache.outputs.cache-hit == 'true' }}
        run: |
          BACKUP="${{ github.workspace }}/data/backup.json"
          NEED_ARTIFACT="false"
          if [ -f "$BACKUP" ]; then
            FILE_TIME=$(stat -c %Y "$BACKUP")
            NOW=$(date +%s)
            AGE_HOURS=$(( (NOW - FILE_TIME) / 3600 ))
            if [ "$AGE_HOURS" -ge 1 ]; then
              echo "Cache expired (${AGE_HOURS}h old), discarding..."
              rm -rf "${{ github.workspace }}/data"
              NEED_ARTIFACT="true"
            else
              echo "Cache fresh (${AGE_HOURS}h old)"
            fi
          fi
          echo "need_artifact=$NEED_ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Download artifact (fallback)
        if: ${{ steps.cache.outputs.cache-hit != 'true' || steps.freshness.outputs.need_artifact == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ github.workspace }}/data

      # ── 4. 配置环境 ──
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      # ── 5. 运行 detail_main.py ──
      - name: Run detail fetch
        id: detail
        working-directory: backend/detail_fetch
        continue-on-error: true
        run: uv run detail_main.py

      # ── 6a. 成功：提交数据到仓库 ──
      - name: Commit and push data
        if: ${{ steps.detail.outcome == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/raw_result.json
          git diff --cached --quiet || git commit -m "📝 Update detail data [automated]"
          git push

      # ── 6b. 失败：保存当前进度到 cache（仓库级别共享，重试可用） ──
      #    key 加入 run_id 保证唯一，避免与已有条目冲突
      - name: Save data for retry
        if: ${{ steps.detail.outcome == 'failure' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/data
          key: detail-state-r${{ steps.inputs.outputs.next_retry }}-${{ github.run_id }}

      # ── 6c. 失败：重新触发本工作流 ──
      - name: Trigger retry
        if: ${{ steps.detail.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const nextRetry = '${{ steps.inputs.outputs.next_retry }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'fetch_detail_data.yml',
              ref: context.ref,
              inputs: {
                retry: nextRetry,
              },
            });
            console.log(`Triggered retry #${nextRetry}`);
