name: fetch_data

on:
  workflow_dispatch:

jobs:
  # ──────────────── Job 1: 获取基础数据 ────────────────
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run fetch script
        working-directory: backend
        run: uv run main.py

      - name: Save data to cache
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/data
          key: detail-state-r0

  # ──────────────── Job 2: 获取详情数据（带自动重试） ────────────────
  fetch_detail:
    needs: fetch
    uses: ./.github/workflows/fetch_detail_data.yml
    with:
      retry: "0"
      artifact_name: "project-state-r0"
    secrets: inherit
